  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Shreya Sharma."
    subtitle: "I get inspired by challenges."
    content: "<mark><i class='fa fa-bullhorn'></i> Looking for Summer 2023 Internships in Software or Machine Learning</mark>
    <p>I am a masters student studying Computer Science at the <a href='https://engineering.jhu.edu/' style='color:#FF0090;'>Johns Hopkins University</a>.
    <p>My technical interests are in Natural Language Processing, Deep Learning, and Software Development. These days, I enjoy learning and building methods to make language models reason over language. To make machines extract language-agnostic meanings from words to bridge the divide between languages is also something I am working on.
    <p>Previously, I worked for 3+ years at <a href='https://www.makemytrip.com/' style='color:#FF0090;'>MakeMyTrip</a>, where I built software to simplify travel for big and small corporations. I also have a B.Tech. in Computer Science from <a href='https://www.iiitd.ac.in/' style='color:#FF0090;'>IIIT Delhi</a>, where I worked with <a href='https://www.iiitd.ac.in/mukesh' style='color:#FF0090;'>Prof. Mukesh Mohania</a>, <a href='https://www.iiitd.ac.in/debarka' style='color:#FF0090;'>Dr. Debarka Sengupta</a>, and <a href='https://www.iiitd.ac.in/pushpendra' style='color:#FF0090;'>Prof. Pushpendra Singh</a> in areas of NLP, Computational Biology, and HCI respectively.
    "
    image: "https://github.com/lshreyasharmal/lshreyasharmal.github.io/themes/web/images/me.jpg"
    button:
